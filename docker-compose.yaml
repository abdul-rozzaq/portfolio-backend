services:

  backend:
    container_name: portfolio-strapi

    build:
      context: .
      dockerfile: Dockerfile

    image: portfolio-strapi

    restart: unless-stopped
    env_file: .env

    volumes:
      - ./.tmp:/app/.tmp
      - ./public:/app/public/uploads

    ports:
      - '1337:1337'

